name: CI
on:
  push:
    branches:
      - main
      - staging
  pull_request: {}

concurrency:
  group: ${{ github.job }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Jobs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
      - name: 🤌 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: ⚙️ Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: 📥 Download deps
        run: pnpm install
      - name: 🔬 Lint
        run: pnpm run lint
      - name: 🔎 Type check
        run: pnpm run typecheck
      - name: 🧪 Run test
        run: pnpm run test
